{% extends "base.html" %}
{% block title %}Our Calculators{% endblock %}

{% block content %}
<div class="container px-4 py-5" id="custom-cards">
   <h2 class="pb-2 border-bottom">Our Calculators</h2>
   <div class="row row-cols-1 row-cols-lg-3 align-items-stretch g-4 py-5">
      <div class="col linear">
         <div class="card card-cover h-100 overflow-hidden text-bg-dark rounded-4 shadow-lg" style="background-image: url('/static/linear_interpolation_image.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat;">
            <div class="d-flex flex-column h-100 p-5 pb-3 text-white text-shadow-1">
               <h3 class="pt-5 mt-5 mb-4 display-6 lh-1 fw-bold">Linear Interpolation</h3>
               <ul class="d-flex list-unstyled mt-auto">
                  <li class="me-auto"> <i class="bi bi-2-circle"></i> </li>
                  <li class="d-flex align-items-center">
                     <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-1-circle" viewBox="0 0 16 16">
                           <path d="M1 8a7 7 0 1 0 14 0A7 7 0 0 0 1 8m15 0A8 8 0 1 1 0 8a8 8 0 0 1 16 0M9.283 4.002V12H7.971V5.338h-.065L6.072 6.656V5.385l1.899-1.383z"/>
                     </svg>
                     <a style="padding-left: 10px; color:white" href="/calculators/linear-interpolation">Use Calculator 1</a> 
                  </li>
               </ul>
            </div>
         </div>
      </div>
      <div class="col">
         <div class="card card-cover h-100 overflow-hidden text-bg-dark rounded-4 shadow-lg" style="background-image: url('/static/matrix.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat;">
            <div class="d-flex flex-column h-100 p-5 pb-3 text-white text-shadow-1">
               <h3 class="pt-5 mt-5 mb-4 display-6 lh-1 fw-bold">Euclidean Calculator (Simplifying Fractions)</h3>
               <ul class="d-flex list-unstyled mt-auto">
                  <li class="me-auto"> <i class="bi bi-2-circle"></i> </li>
                  <li class="d-flex align-items-center">
                     <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-2-circle" viewBox="0 0 16 16">
                        <path d="M1 8a7 7 0 1 0 14 0A7 7 0 0 0 1 8m15 0A8 8 0 1 1 0 8a8 8 0 0 1 16 0M6.646 6.24v.07H5.375v-.064c0-1.213.879-2.402 2.637-2.402 1.582 0 2.613.949 2.613 2.215 0 1.002-.6 1.667-1.287 2.43l-.096.107-1.974 2.22v.077h3.498V12H5.422v-.832l2.97-3.293c.434-.475.903-1.008.903-1.705 0-.744-.557-1.236-1.313-1.236-.843 0-1.336.615-1.336 1.306"/>
                     </svg>
                     <a style="padding-left: 10px; color:white" href="/calculators/euclidean-calculator">Use Calculator 2</a> 
                  </li>
               </ul>
            </div>
         </div>
      </div>
      <div class="col">
         <div class="card card-cover h-100 overflow-hidden text-bg-dark rounded-4 shadow-lg" style="background-image: url('/static/trigonometry.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat;">
            <div class="d-flex flex-column h-100 p-5 pb-3 text-shadow-1">
               <h3 class="pt-5 mt-5 mb-4 display-6 lh-1 fw-bold">Trigonometry</h3>
               <ul class="d-flex list-unstyled mt-auto">
                  <li class="me-auto"> <i class="bi bi-2-circle"></i> </li>
                  <li class="d-flex align-items-center">
                     <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-3-circle" viewBox="0 0 16 16">
                        <path d="M7.918 8.414h-.879V7.342h.838c.78 0 1.348-.522 1.342-1.237 0-.709-.563-1.195-1.348-1.195-.79 0-1.312.498-1.348 1.055H5.275c.036-1.137.95-2.115 2.625-2.121 1.594-.012 2.608.885 2.637 2.062.023 1.137-.885 1.776-1.482 1.875v.07c.703.07 1.71.64 1.734 1.917.024 1.459-1.277 2.396-2.93 2.396-1.705 0-2.707-.967-2.754-2.144H6.33c.059.597.68 1.06 1.541 1.066.973.006 1.6-.563 1.588-1.354-.006-.779-.621-1.318-1.541-1.318"/>
                        <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0M1 8a7 7 0 1 0 14 0A7 7 0 0 0 1 8"/>
                     </svg>
                     <a style="padding-left: 10px; color:white" href="/calculators/trigonometry">Use Calculator 3</a> 
                  </li>
               </ul>
            </div>
         </div>
      </div>
   </div>
</div>
<marquee>Chose any Calculator!</marquee>
{% endblock %}
