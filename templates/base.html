<!DOCTYPE html>
<html lang="en">
<head>
    {% block head %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="/static/styles.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"></script>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='icon.png') }}">
    {% endblock %}
</head>
<body>
    <header>
        <div class="px-3 py-2 text-bg-dark border-bottom"> 
            <div class="container"> 
                <div class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start"> 
                    <a href="/" class="d-flex align-items-center my-2 my-lg-0 me-lg-auto text-white text-decoration-none">
                    </a> 
                    <ul class="nav col-12 col-lg-auto my-2 justify-content-center my-md-0 text-small"> 
                        {% if not current_user.is_authenticated %}
                            <li> 
                                <a href="/login" class="nav-link text-white">
                                    <button type="button" class="btn btn-light text-dark me-2">Login</button> 
                                </a> 
                            </li> 
                            <li> 
                                <a href="/login/sign-up" class="nav-link text-white">
                                    <button type="button" class="btn btn-primary">Sign-up</button>
                                </a> 
                            </li>
                        {% else %}
                            <li> 
                                <a href="/calculators" class="nav-link text-white">
                                    <button type="button" class="btn btn-light text-dark me-2">Calculators</button> 
                                </a> 
                            </li>
                            <li>
                                <a href="/logout" class="nav-link text-white">
                                    <button type="button" class="btn btn-primary">Log Out</button>
                                </a>
                            </li>
                        {% endif %}
                        <li> 
                            <a href="/" class="nav-link text-white">
                                <button type="button" class="btn btn-outline-primary me-2">Home</button>
                            </a> 
                        </li> 
                    </ul> 
                </div> 
            </div> 
        </div>
    </header>

    {% block content %}{% endblock %}

    <footer class="py-3 my-4"> 
        <ul class="nav justify-content-center border-bottom pb-3 mb-3"> 
            <li class="nav-item">
                <a href="#" class="nav-link px-2 text-body-secondary">Home</a>
            </li> 
            <li class="nav-item">
                <a href="#" class="nav-link px-2 text-body-secondary">Features</a>
            </li> 
            <li class="nav-item">
                <a href="#" class="nav-link px-2 text-body-secondary">About</a>
            </li> 
        </ul> 
        <p class="text-center text-body-secondary">©This is where a copyright would go, but I'm too poor.</p> 
    </footer>
</body>
</html>
